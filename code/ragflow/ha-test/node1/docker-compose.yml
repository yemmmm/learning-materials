name: ragflow-ha-node1

x-ragflow-common: &ragflow-common
  image: ${RAGFLOW_IMAGE}
  env_file: ../shared/common.env
  extra_hosts:
    - "host.docker.internal:host-gateway"
  volumes:
    - ../../docker/nginx/ragflow.conf:/etc/nginx/conf.d/ragflow.conf
    - ../../docker/nginx/proxy.conf:/etc/nginx/proxy.conf
    - ../../docker/nginx/nginx.conf:/etc/nginx/nginx.conf
    - ../../docker/service_conf.yaml.template:/ragflow/conf/service_conf.yaml.template
    - ../../docker/entrypoint.sh:/ragflow/entrypoint.sh
    - ../../common/doc_store/es_conn_pool.py:/ragflow/common/doc_store/es_conn_pool.py
    - ./logs:/ragflow/logs
  restart: unless-stopped

services:
  web:
    <<: *ragflow-common
    container_name: ha-node1-web
    command: ["--disable-taskexecutor", "--disable-datasync"]
    ports:
      - "18081:80"
      - "19381:9380"

  worker:
    <<: *ragflow-common
    container_name: ha-node1-worker
    command: ["--disable-webserver", "--disable-datasync", "--workers=2", "--host-id=node1"]

  sync:
    <<: *ragflow-common
    container_name: ha-node1-sync
    command: ["--disable-webserver", "--disable-taskexecutor"]
