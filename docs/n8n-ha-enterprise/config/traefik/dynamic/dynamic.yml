# =============================================================================
# Changed: 2026-06-25 - 全面重构，参考官方 n8n-hosting
# Traefik 动态配置 - n8n 路由
# =============================================================================
# 包含:
#   - n8n main 实例负载均衡（sticky session + 健康检查）
#   - TLS 证书配置
#
# 多服务器部署:
#   如需将副服务器的 n8n 实例也加入负载均衡，在 servers 列表追加即可:
#     - url: "http://li19dksfai10vm.bmwgroup.net:5678"
# =============================================================================

http:
  routers:
    n8n:
      rule: "Host(`li19dksfai11vm.bmwgroup.net`)"
      entryPoints:
        - web
        - websecure
      service: n8n_backend
      priority: 100
      tls: true

  services:
    n8n_backend:
      loadBalancer:
        sticky:
          cookie:
            name: n8n_sid
            secure: true
            httpOnly: true
            sameSite: lax
        healthCheck:
          path: /healthz
          interval: "10s"
          timeout: "3s"
        servers:
          - url: "http://n8n:5678"
          # 副服务器 n8n 实例（如需 API HA）:
          # - url: "http://li19dksfai10vm.bmwgroup.net:5678"

# =============================================================================
# TLS 配置
# =============================================================================
# 离线/企业内网：手动将公司 CA 签发的证书放置到:
#   ./config/traefik/certs/cert.pem
#   ./config/traefik/certs/key.pem
# 如果未放置证书文件，Traefik 使用内置默认自签证书启动
# =============================================================================
tls:
  certificates:
    - certFile: /etc/traefik/certs/cert.pem
      keyFile: /etc/traefik/certs/key.pem
  stores:
    default:
      defaultCertificate:
        certFile: /etc/traefik/certs/cert.pem
        keyFile: /etc/traefik/certs/key.pem
