# Changed: 2026-06-25 - 全面重构，参考官方 n8n-hosting，简化配置
# Traefik v3 静态配置

global:
  checkNewVersion: false
  sendAnonymousUsage: false

# 入口点
entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"
  traefik:
    address: ":8080"

# Dashboard / Ping
api:
  dashboard: true
  insecure: true

ping:
  entryPoint: "traefik"

# Providers
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    watch: true
    network: "n8n-net"
  file:
    directory: "/etc/traefik/dynamic"
    watch: true

# 日志
log:
  level: INFO
  filePath: "/var/log/traefik/traefik.log"
accessLog:
  filePath: "/var/log/traefik/access.log"
  bufferingSize: 100
  fields:
    defaultMode: keep
    headers:
      defaultMode: drop
      names:
        Authorization: drop
        Cookie: drop
        Set-Cookie: drop
