# Traefik v3 静态配置
global:
  checkNewVersion: false
  sendAnonymousUsage: false

# 入口点
entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"
  traefik:
    address: ":8080"

# Dashboard / Ping
api:
  dashboard: true
  insecure: true

ping:
  entryPoint: "traefik"

# Providers
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    watch: true
    network: "n8n-ha-net"
  file:
    directory: "/etc/traefik/dynamic"
    watch: true

# Metrics
metrics:
  prometheus:
    addEntryPointsLabels: true
    addServicesLabels: true
    entryPoint: traefik

# 日志
log:
  level: INFO
  filePath: "/var/log/traefik/traefik.log"
accessLog:
  filePath: "/var/log/traefik/access.log"
  bufferingSize: 100
  fields:
    defaultMode: keep
    headers:
      defaultMode: drop
      names:
        Authorization: drop
        Cookie: drop
        Set-Cookie: drop
