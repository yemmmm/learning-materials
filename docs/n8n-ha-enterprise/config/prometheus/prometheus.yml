# Prometheus 抓取配置
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: n8n-ha-enterprise
    environment: local

scrape_configs:
  # Traefik metrics
  - job_name: traefik
    static_configs:
      - targets: ["traefik:8080"]
        labels:
          service: traefik

  # n8n main 1
  - job_name: n8n_main_1
    metrics_path: /metrics
    static_configs:
      - targets: ["n8n-main-1:5678"]
        labels:
          service: n8n
          role: main
          node: main-1

  # n8n main 2
  - job_name: n8n_main_2
    metrics_path: /metrics
    static_configs:
      - targets: ["n8n-main-2:5678"]
        labels:
          service: n8n
          role: main
          node: main-2

  # n8n workers
  - job_name: n8n_workers
    metrics_path: /metrics
    static_configs:
      - targets:
          - "n8n-worker-1:5678"
          - "n8n-worker-2:5678"
          - "n8n-worker-3:5678"
        labels:
          service: n8n
          role: worker

  # Postgres exporter (可选 - 需要额外部署 postgres_exporter)
  # - job_name: postgres
  #   static_configs:
  #     - targets: ["postgres-exporter:9187"]

  # Redis exporter (可选)
  # - job_name: redis
  #   static_configs:
  #     - targets: ["redis-exporter:9121"]

  # Prometheus 自身
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
