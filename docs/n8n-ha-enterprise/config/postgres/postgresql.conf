# =============================================================================
# PostgreSQL 15 性能调优配置
# -----------------------------------------------------------------------------
# 适配场景：n8n Enterprise HA（多 main + 多 worker），预计中等负载
# 硬件假设：4-8 CPU / 8-16 GB RAM / SSD
# 调优参数按 shared_buffers = RAM * 25% 经验值设定，本配置假设 8GB 可用内存
# 生产部署请根据实际硬件重新计算，参考：https://pgtune.leopard.in.ua/
# =============================================================================

# --- 连接 --------------------------------------------------------------------
listen_addresses = '*'                      # 允许 docker 网络内其他容器连接
max_connections = 200                       # n8n main + workers + 备用
superuser_reserved_connections = 5

# --- 内存 --------------------------------------------------------------------
shared_buffers = 2GB                        # RAM * 25%
effective_cache_size = 6GB                  # RAM * 75%
work_mem = 32MB                             # 单 query 排序/hash 内存（注意：每个连接 × 每个操作 都会分配）
maintenance_work_mem = 512MB                # VACUUM / CREATE INDEX 用的内存
autovacuum_work_mem = -1                    # 跟随 maintenance_work_mem

# --- WAL / 检查点 ------------------------------------------------------------
wal_buffers = 16MB                          # WAL 写缓冲（shared_buffers 的 1/32 上限）
checkpoint_timeout = 15min                  # 检查点间隔（默认 5min，调大减少 IO 突发）
max_wal_size = 4GB                          # 检查点间最大 WAL
min_wal_size = 1GB
checkpoint_completion_target = 0.9         # 平滑检查点写入
archive_mode = off                          # 单实例不需要归档

# --- 并发 / 并行查询 ---------------------------------------------------------
max_worker_processes = 8                    # 等于 CPU 核数
max_parallel_workers_per_gather = 2
max_parallel_workers = 8
max_parallel_maintenance_workers = 2

# --- 自动 VACUUM（n8n 执行历史表写入频繁，重点调优） --------------------------
autovacuum = on
autovacuum_max_workers = 4
autovacuum_naptime = 30s                    # 检查频率（默认 1min）
autovacuum_vacuum_scale_factor = 0.05       # 5% 行变更就触发（默认 20%）
autovacuum_analyze_scale_factor = 0.025
autovacuum_vacuum_cost_limit = 1000
autovacuum_vacuum_cost_delay = 2ms

# --- Planner / 统计 ----------------------------------------------------------
random_page_cost = 1.1                      # SSD 推近 1.0
effective_io_concurrency = 200              # SSD 推荐 200
default_statistics_target = 200             # 默认 100，调大提升计划器精度
track_io_timing = on

# --- 日志 --------------------------------------------------------------------
log_min_duration_statement = 500            # 慢查询阈值 500ms
log_checkpoints = on
log_connections = off
log_disconnections = off
log_line_prefix = '%m [%p] %u@%d '
log_lock_waits = on

# --- n8n 专用：执行历史表（大量写入，建议分区或定期清理） -------------------
# n8n 自身在应用层会执行 prune，但 PG 层也应配置：
#   - 定期 VACUUM ANALYZE（由 autovacuum 处理）
#   - execution_data 表会快速增长，建议在 n8n 设置 executions data prune

# =============================================================================