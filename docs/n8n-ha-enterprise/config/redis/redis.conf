# =============================================================================
# Redis 7 配置 - n8n BullMQ 队列 + Leader 选举
# -----------------------------------------------------------------------------
# 调优重点：
#   - 内存上限与淘汰策略（n8n 队列任务不应被 LRU 淘汰）
#   - 持久化：AOF + RDB 双保险（队列丢失 = 任务丢失）
#   - 客户端缓冲区（避免大 workflow 把 redis 撑爆）
# =============================================================================

# 绑定与认证
bind 0.0.0.0
protected-mode yes
requirepass 1mfy3DHcCIKR1WLfXLX9b9Sy

# 内存管理（n8n 队列任务通常不大，512MB 足够中等规模）
maxmemory 512mb
# noeviction: 队列任务不允许被淘汰
maxmemory-policy noeviction

# 持久化 - AOF（每秒刷盘，性能与可靠性平衡）
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
# AOF 体积翻倍就重写
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# 持久化 - RDB（额外保险，每 15 分钟有 4 个以上写入就快照）
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes

# 客户端缓冲区（防止慢客户端拖垮 Redis）
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 64mb 16mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# 超时
# 闲置 5 分钟断开
timeout 300
tcp-keepalive 60

# 哨兵 / 集群（单实例模式不需要）
# sentinel/cluster 单节点模式下未启用

# 日志
loglevel notice
logfile ""

# 慢查询
# 阈值 10ms
slowlog-log-slower-than 10000
slowlog-max-len 128

# Hash / List 优化（n8n BullMQ 用 List + Hash）
hash-max-listpack-entries 512
hash-max-listpack-value 64
list-max-listpack-size -2

# =============================================================================