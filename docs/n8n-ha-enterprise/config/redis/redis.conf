# =============================================================================
# Changed: 2026-06-25 - 全面重构，参考官方 n8n-hosting，移除硬编码密码
# Redis 7 配置 - n8n BullMQ 队列 + Leader 选举
# =============================================================================
# 注意:
#   - 密码通过 docker-compose command 的 --requirepass 参数传入
#   - 不要在本文件硬编码密码，避免进入 Git 历史
#   - 副服务器通过主机网络访问本 Redis，请确保防火墙放行 6379 端口
# =============================================================================

# 绑定与认证
bind 0.0.0.0
protected-mode yes

# 内存管理（n8n 队列任务不允许被淘汰）
maxmemory 512mb
maxmemory-policy noeviction

# 持久化 - AOF（每秒刷盘，性能与可靠性平衡）
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# 持久化 - RDB（额外保险）
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes

# 客户端缓冲区
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 64mb 16mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# 超时
timeout 300
tcp-keepalive 60

# 日志
loglevel notice
logfile ""

# 慢查询
slowlog-log-slower-than 10000
slowlog-max-len 128

# Hash / List 优化（n8n BullMQ 用 List + Hash）
hash-max-listpack-entries 512
hash-max-listpack-value 64
list-max-listpack-size -2
