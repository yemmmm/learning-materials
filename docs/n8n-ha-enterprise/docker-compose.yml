# =============================================================================
# n8n Enterprise HA Cluster (Multi-Main Queue Mode)
# -----------------------------------------------------------------------------
# Topology (每个 service 模拟一个独立节点，通过 container_name + hostname 区分):
#
#                          ┌──────────────────────────┐
#   Client / Webhook  ───▶ │  traefik (LB) :5680/:5681│
#                          └────────────┬─────────────┘
#                                       │ round-robin + healthcheck
#                    ┌──────────────────┼──────────────────┐
#                    ▼                                     ▼
#          ┌──────────────────┐                  ┌──────────────────┐
#          │ n8n-main-1       │                  │ n8n-main-2       │
#          │ (leader candidate)│                 │ (follower)       │
#          │ EXECUTIONS_MODE= │                  │ EXECUTIONS_MODE= │
#          │ queue + multi-main│                 │ queue + multi-main│
#          └────────┬─────────┘                  └────────┬─────────┘
#                   │ push job                             │
#                   └──────────────┬───────────────────────┘
#                              ┌──▼───┐
#                              │redis │  ← BullMQ + Leader Election
#                              └──┬───┘
#                   ┌─────────────┼─────────────┐
#                   ▼             ▼             ▼
#          ┌─────────────┐ ┌─────────────┐ ┌─────────────┐
#          │n8n-worker-1 │ │n8n-worker-2 │ │n8n-worker-3 │
#          └──────┬──────┘ └──────┬──────┘ └──────┬──────┘
#                 └────────────────┼────────────────┘
#                              ┌──▼───┐
#                              │ PG   │  ← shared workflow/credential/execution state
#                              └──┬───┘
#                              ┌──▼───┐
#                              │MinIO │  ← binary data (S3)
#                              └──────┘
#
# Monitoring:
#   prometheus :9090  → scrapes n8n /metrics, traefik /metrics, redis_exporter
#   grafana    :3001  → dashboards
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Ingress: Traefik 反向代理 + 负载均衡
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v3.1
    container_name: n8n-ha-traefik
    hostname: traefik
    restart: unless-stopped
    environment:
      - DOCKER_API_VERSION=1.41
    ports:
      - "5680:80"      # HTTP 入口
      - "5681:443"     # HTTPS 入口（自签证书或后续配置）
      - "8889:8080"    # Traefik Dashboard
    volumes:
      - ./config/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./config/traefik/dynamic:/etc/traefik/dynamic:ro
      - ./config/traefik/logs:/var/log/traefik
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      n8n-ha-net:
        aliases:
          - n8n.local    # 让 n8n 容器内可以通过此域名访问 LB
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    labels:
      - "traefik.enable=true"

  # ---------------------------------------------------------------------------
  # PostgreSQL 15 + 调优配置
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: n8n-ha-postgres
    hostname: postgres
    restart: unless-stopped
    ports:
      - "5435:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./config/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [n8n-ha-net]

  # ---------------------------------------------------------------------------
  # Redis 7 + BullMQ + 持久化
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: n8n-ha-redis
    hostname: redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./data/redis:/data
      - ./config/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks: [n8n-ha-net]

  # ---------------------------------------------------------------------------
  # MinIO (S3 兼容对象存储) - 用于 n8n binary data 外置
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: n8n-ha-minio
    hostname: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9002:9000"    # S3 API
      - "9003:9001"    # Console
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [n8n-ha-net]

  # 初始化 MinIO bucket（一次性任务）
  minio-init:
    image: minio/mc:latest
    container_name: n8n-ha-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb -p local/${MINIO_BUCKET_N8N} || true;
      mc anonymous set download local/${MINIO_BUCKET_N8N} || true;
      echo 'MinIO bucket initialized.';
      "
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    networks: [n8n-ha-net]
    restart: "no"

  # ---------------------------------------------------------------------------
  # n8n Main #1 (Leader candidate)
  # ---------------------------------------------------------------------------
  n8n-main-1:
    image: n8nio/n8n:latest
    container_name: n8n-ha-main-1
    hostname: n8n-main-1
    restart: unless-stopped
    env_file: [.env]
    environment:
      - N8N_HOST=n8n.local
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5680/
      - N8N_EDITOR_BASE_URL=http://localhost:5680/
      # Queue mode + multi-main (Enterprise)
      - EXECUTIONS_MODE=queue
      - N8N_CONCURRENCY_PRODUCTION_LIMIT=20
      - QUEUE_HEALTH_CHECK_ACTIVE=true
      - QUEUE_HEALTH_CHECK_INTERVAL_SECONDS=30
      # Database
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      # Redis (BullMQ + leader election)
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - QUEUE_BULL_REDIS_PASSWORD=${REDIS_PASSWORD}
      # Binary data -> S3 (需要 license；默认 filesystem，激活 license 后切换为 s3)
      - N8N_DEFAULT_BINARY_DATA_MODE=${N8N_BINARY_DATA_MODE:-filesystem}
      - N8N_EXTERNAL_STORAGE_S3_HOST=minio:9000
      - N8N_EXTERNAL_STORAGE_S3_BUCKET_NAME=${MINIO_BUCKET_N8N}
      - N8N_EXTERNAL_STORAGE_S3_BUCKET_REGION=us-east-1
      - N8N_EXTERNAL_STORAGE_S3_ACCESS_KEY=${MINIO_ROOT_USER}
      - N8N_EXTERNAL_STORAGE_S3_ACCESS_SECRET=${MINIO_ROOT_PASSWORD}
      - N8N_EXTERNAL_STORAGE_S3_FORCE_PATH_STYLE=true
      # License (留空，激活后填入)
      - N8N_LICENSE_ACTIVATION_KEY=${N8N_LICENSE_ACTIVATION_KEY:-}
      # 加密密钥（必须共享）
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      # 其他
      - N8N_METRICS=true
      - N8N_METRICS_INCLUDE_LEGACY_METRICS=false
      - N8N_LOG_LEVEL=${N8N_LOG_LEVEL:-info}
      - N8N_LOG_OUTPUT=console
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
      - N8N_SECURE_COOKIE=false
      - GENERIC_TIMEZONE=Asia/Shanghai
      - TZ=Asia/Shanghai
      - NODE_ENV=production
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      # 把手动执行也路由到 worker（multi-main 模式推荐）
      - OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS=true
    volumes:
      - ./volumes/n8n-main-1:/home/node/.n8n
      - /local-files:/local-files:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks: [n8n-ha-net]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz | grep -q '\"status\":\"ok\"' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    labels:
      - "traefik.enable=false"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2g

  # ---------------------------------------------------------------------------
  # n8n Main #2 (Follower / Leader candidate)
  # ---------------------------------------------------------------------------
  n8n-main-2:
    image: n8nio/n8n:latest
    container_name: n8n-ha-main-2
    hostname: n8n-main-2
    restart: unless-stopped
    env_file: [.env]
    environment:
      - N8N_HOST=n8n.local
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5680/
      - N8N_EDITOR_BASE_URL=http://localhost:5680/
      - EXECUTIONS_MODE=queue
      - N8N_CONCURRENCY_PRODUCTION_LIMIT=20
      - QUEUE_HEALTH_CHECK_ACTIVE=true
      - QUEUE_HEALTH_CHECK_INTERVAL_SECONDS=30
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - QUEUE_BULL_REDIS_PASSWORD=${REDIS_PASSWORD}
      - N8N_DEFAULT_BINARY_DATA_MODE=${N8N_BINARY_DATA_MODE:-filesystem}
      - N8N_EXTERNAL_STORAGE_S3_HOST=minio:9000
      - N8N_EXTERNAL_STORAGE_S3_BUCKET_NAME=${MINIO_BUCKET_N8N}
      - N8N_EXTERNAL_STORAGE_S3_BUCKET_REGION=us-east-1
      - N8N_EXTERNAL_STORAGE_S3_ACCESS_KEY=${MINIO_ROOT_USER}
      - N8N_EXTERNAL_STORAGE_S3_ACCESS_SECRET=${MINIO_ROOT_PASSWORD}
      - N8N_EXTERNAL_STORAGE_S3_FORCE_PATH_STYLE=true
      - N8N_LICENSE_ACTIVATION_KEY=${N8N_LICENSE_ACTIVATION_KEY:-}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_METRICS=true
      - N8N_METRICS_INCLUDE_LEGACY_METRICS=false
      - N8N_LOG_LEVEL=${N8N_LOG_LEVEL:-info}
      - N8N_LOG_OUTPUT=console
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
      - N8N_SECURE_COOKIE=false
      - GENERIC_TIMEZONE=Asia/Shanghai
      - TZ=Asia/Shanghai
      - NODE_ENV=production
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS=true
    volumes:
      - ./volumes/n8n-main-2:/home/node/.n8n
      - /local-files:/local-files:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks: [n8n-ha-net]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz | grep -q '\"status\":\"ok\"' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    labels:
      - "traefik.enable=false"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2g

  # ---------------------------------------------------------------------------
  # n8n Worker x 3 (无状态，可水平扩展)
  # ---------------------------------------------------------------------------
  n8n-worker-1:
    image: n8nio/n8n:latest
    container_name: n8n-ha-worker-1
    hostname: n8n-worker-1
    restart: unless-stopped
    command: ["worker", "--concurrency=10"]
    env_file: [.env]
    environment:
      - EXECUTIONS_MODE=queue
      - N8N_CONCURRENCY_PRODUCTION_LIMIT=10
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - QUEUE_BULL_REDIS_PASSWORD=${REDIS_PASSWORD}
      - N8N_DEFAULT_BINARY_DATA_MODE=${N8N_BINARY_DATA_MODE:-filesystem}
      - N8N_EXTERNAL_STORAGE_S3_HOST=minio:9000
      - N8N_EXTERNAL_STORAGE_S3_BUCKET_NAME=${MINIO_BUCKET_N8N}
      - N8N_EXTERNAL_STORAGE_S3_BUCKET_REGION=us-east-1
      - N8N_EXTERNAL_STORAGE_S3_ACCESS_KEY=${MINIO_ROOT_USER}
      - N8N_EXTERNAL_STORAGE_S3_ACCESS_SECRET=${MINIO_ROOT_PASSWORD}
      - N8N_EXTERNAL_STORAGE_S3_FORCE_PATH_STYLE=true
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_METRICS=true
      - N8N_METRICS_INCLUDE_LEGACY_METRICS=false
      - N8N_LOG_LEVEL=${N8N_LOG_LEVEL:-info}
      - N8N_LOG_OUTPUT=console
      - N8N_DIAGNOSTICS_ENABLED=false
      - GENERIC_TIMEZONE=Asia/Shanghai
      - TZ=Asia/Shanghai
      - NODE_ENV=production
    volumes:
      - ./volumes/n8n-worker-1:/home/node/.n8n
      - /local-files:/local-files:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks: [n8n-ha-net]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/metrics | grep -q '^n8n_process_cpu' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1500m

  n8n-worker-2:
    image: n8nio/n8n:latest
    container_name: n8n-ha-worker-2
    hostname: n8n-worker-2
    restart: unless-stopped
    command: ["worker", "--concurrency=10"]
    env_file: [.env]
    environment:
      - EXECUTIONS_MODE=queue
      - N8N_CONCURRENCY_PRODUCTION_LIMIT=10
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - QUEUE_BULL_REDIS_PASSWORD=${REDIS_PASSWORD}
      - N8N_DEFAULT_BINARY_DATA_MODE=${N8N_BINARY_DATA_MODE:-filesystem}
      - N8N_EXTERNAL_STORAGE_S3_HOST=minio:9000
      - N8N_EXTERNAL_STORAGE_S3_BUCKET_NAME=${MINIO_BUCKET_N8N}
      - N8N_EXTERNAL_STORAGE_S3_BUCKET_REGION=us-east-1
      - N8N_EXTERNAL_STORAGE_S3_ACCESS_KEY=${MINIO_ROOT_USER}
      - N8N_EXTERNAL_STORAGE_S3_ACCESS_SECRET=${MINIO_ROOT_PASSWORD}
      - N8N_EXTERNAL_STORAGE_S3_FORCE_PATH_STYLE=true
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_METRICS=true
      - N8N_METRICS_INCLUDE_LEGACY_METRICS=false
      - N8N_LOG_LEVEL=${N8N_LOG_LEVEL:-info}
      - N8N_LOG_OUTPUT=console
      - N8N_DIAGNOSTICS_ENABLED=false
      - GENERIC_TIMEZONE=Asia/Shanghai
      - TZ=Asia/Shanghai
      - NODE_ENV=production
    volumes:
      - ./volumes/n8n-worker-2:/home/node/.n8n
      - /local-files:/local-files:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks: [n8n-ha-net]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/metrics | grep -q '^n8n_process_cpu' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1500m

  n8n-worker-3:
    image: n8nio/n8n:latest
    container_name: n8n-ha-worker-3
    hostname: n8n-worker-3
    restart: unless-stopped
    command: ["worker", "--concurrency=10"]
    env_file: [.env]
    environment:
      - EXECUTIONS_MODE=queue
      - N8N_CONCURRENCY_PRODUCTION_LIMIT=10
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - QUEUE_BULL_REDIS_PASSWORD=${REDIS_PASSWORD}
      - N8N_DEFAULT_BINARY_DATA_MODE=${N8N_BINARY_DATA_MODE:-filesystem}
      - N8N_EXTERNAL_STORAGE_S3_HOST=minio:9000
      - N8N_EXTERNAL_STORAGE_S3_BUCKET_NAME=${MINIO_BUCKET_N8N}
      - N8N_EXTERNAL_STORAGE_S3_BUCKET_REGION=us-east-1
      - N8N_EXTERNAL_STORAGE_S3_ACCESS_KEY=${MINIO_ROOT_USER}
      - N8N_EXTERNAL_STORAGE_S3_ACCESS_SECRET=${MINIO_ROOT_PASSWORD}
      - N8N_EXTERNAL_STORAGE_S3_FORCE_PATH_STYLE=true
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_METRICS=true
      - N8N_METRICS_INCLUDE_LEGACY_METRICS=false
      - N8N_LOG_LEVEL=${N8N_LOG_LEVEL:-info}
      - N8N_LOG_OUTPUT=console
      - N8N_DIAGNOSTICS_ENABLED=false
      - GENERIC_TIMEZONE=Asia/Shanghai
      - TZ=Asia/Shanghai
      - NODE_ENV=production
    volumes:
      - ./volumes/n8n-worker-3:/home/node/.n8n
      - /local-files:/local-files:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks: [n8n-ha-net]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/metrics | grep -q '^n8n_process_cpu' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1500m

  # ---------------------------------------------------------------------------
  # Monitoring: Prometheus + Grafana
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: n8n-ha-prometheus
    hostname: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./data/prometheus:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    networks: [n8n-ha-net]

  grafana:
    image: grafana/grafana:latest
    container_name: n8n-ha-grafana
    hostname: grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./data/grafana:/var/lib/grafana
    depends_on: [prometheus]
    networks: [n8n-ha-net]

networks:
  n8n-ha-net:
    driver: bridge
    name: n8n-ha-net
