# =============================================================================
# n8n Enterprise HA - 主服务器 (li19dksfai11vm)
# =============================================================================
# 参考: https://github.com/n8n-io/n8n-hosting/tree/main/docker-compose/withPostgresAndWorker
#
# 架构 (Queue Mode + Multi-Main):
#
#   Client / Webhook ───▶ Traefik (:80/:443)
#                              │
#                              ▼
#                         n8n (main)         ← API/UI/Webhook
#                              │
#                              ▼
#                         Redis              ← BullMQ Queue + Leader Election
#                              │
#                              ▼
#                         n8n-worker(s)      ← 执行器，可横向扩展
#
#   外部依赖:
#     PostgreSQL  → 外部 PG 数据库（不在本 compose 中管理）
#     Redis       → 本机 Redis，副服务器通过主机网络访问
#     Task Runners → 每个 n8n 实例配一个 runner sidecar (Code 节点必需)
#
# 多服务器部署:
#   主服务器 (11vm): 本文件 - Traefik + n8n + Redis + workers
#   副服务器 (10vm): docker-compose.worker.yml - workers only（连接到本机 Redis）
# =============================================================================

volumes:
  n8n_main_storage:
  n8n_worker_storage:
  redis_storage:

# ---------------------------------------------------------------------------
# YAML Anchors (参考官方 n8n-hosting 模式)
# ---------------------------------------------------------------------------
x-shared: &shared
  restart: always
  # Changed: 2026-06-25 - 使用 docker.n8n.io 官方 registry；如不可用可改为 n8nio/n8n:latest
  image: docker.n8n.io/n8nio/n8n:${N8N_VERSION:-stable}
  env_file: [.env]
  environment:
    # --- 数据库 (外部 PostgreSQL) ---
    - DB_TYPE=postgresdb
    - DB_POSTGRESDB_HOST=${DB_POSTGRESDB_HOST}
    - DB_POSTGRESDB_PORT=${DB_POSTGRESDB_PORT:-5432}
    - DB_POSTGRESDB_DATABASE=${DB_POSTGRESDB_DATABASE}
    - DB_POSTGRESDB_USER=${DB_POSTGRESDB_USER}
    - DB_POSTGRESDB_PASSWORD=${DB_POSTGRESDB_PASSWORD}
    - DB_POSTGRESDB_SCHEMA=${DB_POSTGRESDB_SCHEMA:-public}
    # --- Queue Mode ---
    - EXECUTIONS_MODE=queue
    - QUEUE_BULL_REDIS_HOST=${QUEUE_BULL_REDIS_HOST:-redis}
    - QUEUE_BULL_REDIS_PORT=${QUEUE_BULL_REDIS_PORT:-6379}
    - QUEUE_BULL_REDIS_PASSWORD=${QUEUE_BULL_REDIS_PASSWORD}
    - QUEUE_BULL_REDIS_DB=${QUEUE_BULL_REDIS_DB:-0}
    - QUEUE_HEALTH_CHECK_ACTIVE=true
    # --- 加密 ---
    - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
    # --- Task Runners (n8n 2.0+ Code 节点必需) ---
    - N8N_RUNNERS_MODE=external
    - N8N_RUNNERS_AUTH_TOKEN=${RUNNERS_AUTH_TOKEN}
    - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=0.0.0.0
    # --- 把手动执行也路由到 worker ---
    - OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS=true
    # --- Host / Protocol ---
    - N8N_HOST=${N8N_HOST}
    - N8N_PORT=5678
    - N8N_PROTOCOL=${N8N_PROTOCOL:-https}
    - WEBHOOK_URL=${WEBHOOK_URL}
    - N8N_EDITOR_BASE_URL=${N8N_EDITOR_BASE_URL}
    - N8N_SECURE_COOKIE=true
    # --- License ---
    - N8N_LICENSE_ACTIVATION_KEY=${N8N_LICENSE_ACTIVATION_KEY:-}
    # --- 日志 ---
    - N8N_LOG_LEVEL=${N8N_LOG_LEVEL:-info}
    - N8N_LOG_OUTPUT=console
    - N8N_DIAGNOSTICS_ENABLED=false
    - N8N_PERSONALIZATION_ENABLED=false
    # --- 时区 ---
    - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-Asia/Shanghai}
    - TZ=${TZ:-Asia/Shanghai}
    - NODE_ENV=production
  networks: [n8n-net]

x-runner: &runner
  restart: always
  image: n8nio/runners:${N8N_VERSION:-stable}
  environment:
    - N8N_RUNNERS_AUTH_TOKEN=${RUNNERS_AUTH_TOKEN}

# =============================================================================
# Services
# =============================================================================
services:

  # ---------------------------------------------------------------------------
  # Traefik - 反向代理 + TLS 终结
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v3.1
    container_name: n8n-traefik
    hostname: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:8889:8080"    # Dashboard 仅本机访问
    volumes:
      - ./config/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./config/traefik/dynamic:/etc/traefik/dynamic:ro
      - ./config/traefik/certs:/etc/traefik/certs:ro
      - ./config/traefik/logs:/var/log/traefik
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      n8n-net:
        aliases:
          - n8n.local
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    labels:
      - "traefik.enable=true"

  # ---------------------------------------------------------------------------
  # Redis - BullMQ 队列 + Leader 选举
  # 副服务器通过主机网络访问（端口在 redis.conf 中配置）
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: n8n-redis
    hostname: redis
    restart: always
    ports:
      # Changed: 2026-06-25 - 暴露 Redis 端口给副服务器访问
      - "${REDIS_BIND_PORT:-6379}:6379"
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./data/redis:/data
      - ./config/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${QUEUE_BULL_REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [n8n-net]

  # ---------------------------------------------------------------------------
  # n8n Main - API / UI / Webhook
  # ---------------------------------------------------------------------------
  n8n:
    <<: *shared
    container_name: n8n-main
    hostname: n8n-main
    volumes:
      # Changed: 2026-06-25 - 数据路径挂载到 compose 文件同目录下
      - ./data/n8n-main:/home/node/.n8n
      - /local-files:/local-files:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz | grep -q '\"status\":\"ok\"' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2g

  # ---------------------------------------------------------------------------
  # n8n Main Task Runner - Code 节点执行 sidecar
  # ---------------------------------------------------------------------------
  n8n-runner:
    <<: *runner
    container_name: n8n-main-runner
    hostname: n8n-main-runner
    environment:
      - N8N_RUNNERS_AUTH_TOKEN=${RUNNERS_AUTH_TOKEN}
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n:5679
    depends_on:
      - n8n
    networks: [n8n-net]

  # ---------------------------------------------------------------------------
  # n8n Worker - 任务执行器
  # ---------------------------------------------------------------------------
  n8n-worker:
    <<: *shared
    container_name: n8n-worker
    hostname: n8n-worker
    command: worker
    volumes:
      - ./data/n8n-worker:/home/node/.n8n
      - /local-files:/local-files:ro
    depends_on:
      - n8n
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/metrics | grep -q 'n8n_' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1500m

  # ---------------------------------------------------------------------------
  # n8n Worker Task Runner - Code 节点执行 sidecar
  # ---------------------------------------------------------------------------
  n8n-worker-runner:
    <<: *runner
    container_name: n8n-worker-runner
    hostname: n8n-worker-runner
    environment:
      - N8N_RUNNERS_AUTH_TOKEN=${RUNNERS_AUTH_TOKEN}
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n-worker:5679
    depends_on:
      - n8n-worker
    networks: [n8n-net]

networks:
  n8n-net:
    driver: bridge
    name: n8n-net
